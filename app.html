<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2.5fr; gap: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #27ae60; }
        
        .search-wrapper { margin-bottom: 15px; }
        #searchBar { padding: 10px; border: 2px solid #34495e; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }

        .table-scroll-container { max-height: 450px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 1; }
        tr:hover { background-color: #f1f2f6; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; width: auto; font-size: 12px; display: inline-block; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background-color: #c0392b; }
        .btn-edit { background-color: #3498db; width: auto; font-size: 12px; padding: 5px 10px; margin-right: 5px; display: inline-block; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-edit:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Employee Database Directory</h1>

    <div class="container">
        <!-- FORM INTERFACE -->
        <div class="card">
            <h2>Add Employee</h2>
            <form id="empForm">
                <div class="form-group"><label>Emp Code</label><input type="text" id="empcode" required></div>
                <div class="form-group"><label>Name</label><input type="text" id="empname" required></div>
                <div class="form-group"><label>Address</label><input type="text" id="empaddress" required></div>
                <div class="form-group"><label>Zip Code</label><input type="text" id="empzipcode" required></div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="empstatus">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">Save Record</button>
            </form>
        </div>

        <!-- LIST TABLE VIEW -->
        <div class="card">
            <h2>Employee List</h2>
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="🔍 Type to search employees...">
            </div>
            <div class="table-scroll-container">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Zip</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "/employees";
        let isEditMode = false;

        // --- 1. LOAD EMPLOYEES (ASYNC LAYOUT) ---
        async function loadEmployees() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tbody = document.getElementById("employeeTableBody");
                tbody.innerHTML = "";
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Empty database.</td></tr>";
                    return;
                }
                
                data.forEach(emp => {
                    const code = emp.empcode || emp.EmpCode || "";
                    const name = emp.empname || emp.EmpName || "";
                    const address = emp.empaddress || emp.EmpAddress || "";
                    const zip = emp.empzipcode || emp.EmpZipCode || "";
                    const status = emp.empstatus || emp.EmpStatus || "ACTIVE";

                    const tr = document.createElement("tr");
                    tr.className = "employee-row";
                    tr.innerHTML = `
                        <td>${code}</td>
                        <td><b>${name}</b></td>
                        <td>${address}</td>
                        <td>${zip}</td>
                        <td>${status}</td>
                        <td>
                            <button class="btn-edit" onclick="populateFormForEdit('${code}','${name}','${address}','${zip}','${status}')">Edit</button>
                            <button class="btn-delete" onclick="deleteEmployee('${code}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("UI Render Failure:", err);
            }
        }

        // --- 2. LIVE SEARCH SYSTEM ---
        document.getElementById("searchBar").addEventListener("keyup", function() {
            const keyword = this.value.toLowerCase();
            document.querySelectorAll(".employee-row").forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(keyword) ? "" : "none";
            });
        });

        // --- 3. POPULATE FOR EDIT ---
        function populateFormForEdit(code, name, address, zip, status) {
            isEditMode = true;
            document.getElementById("empcode").value = code;
            document.getElementById("empcode").disabled = true;
            document.getElementById("empname").value = name;
            document.getElementById("empaddress").value = address;
            document.getElementById("empzipcode").value = zip;
            document.getElementById("empstatus").value = status;
            
            const btn = document.getElementById("submitBtn");
            btn.innerText = "Update Record";
            btn.style.backgroundColor = "#3498db";
        }

        // --- 4. FORM RESET ---
        function resetForm() {
            isEditMode = false;
            document.getElementById("empForm").reset();
            document.getElementById("empcode").disabled = false;
            const btn = document.getElementById("submitBtn");
            btn.innerText = "Save Record";
            btn.style.backgroundColor = "#2ecc71";
        }

        // --- 5. SAVE / UPDATE PIPELINE ---
        document.getElementById("empForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const code = document.getElementById("empcode").value;
            const payload = {
                empcode: code,
                empname: document.getElementById("empname").value,
                empaddress: document.getElementById("empaddress").value,
                empzipcode: document.getElementById("empzipcode").value,
                empstatus: document.getElementById("empstatus").value
            };

            const url = isEditMode ? `${API_URL}/${code}` : API_URL;
            const method = isEditMode ? "PUT" : "POST";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                alert(data.message || "Done!");
                resetForm();
                loadEmployees();
            } catch (err) {
                alert("Transaction failed: " + err.message);
            }
        });

        // --- 6. DELETE TRANSACTION ENGINE ---
        async function deleteEmployee(empCode) {
            if (confirm(`Remove employee ${empCode}?`)) {
                try {
                    const res = await fetch(`${API_URL}/${empCode}`, { method: "DELETE" });
                    const data = await res.json();
                    alert(data.message || "Deleted!");
                    loadEmployees();
                } catch (err) {
                    console.error(err);
                }
            }
        }

        // --- 7. RUN WEB APPLICATION ON PAGE LOAD ---
        loadEmployees();
    </script>
</body>
</html>
