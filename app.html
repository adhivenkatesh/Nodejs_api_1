<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2.5fr; gap: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Interactive Buttons */
        .btn-submit { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-cancel { background-color: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; display: none; }
        .btn-cancel:hover { background-color: #7f8c8d; }
        .btn-delete { background-color: #e74c3c; padding: 6px 12px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete:hover { background-color: #c0392b; }
        
        .search-wrapper { margin-bottom: 15px; }
        #searchBar { padding: 10px; border: 2px solid #34495e; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }

        /* Scrollable List Container */
        .employee-list-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        /* Sticky Header for Smooth Scrolling */
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 10; }
        
        .employee-row { cursor: pointer; transition: background-color 0.2s; }
        .employee-row:hover { background-color: #f1f2f6; }
        
        /* Status Badges */
        .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; display: inline-block; }
        .status-badge.active { background-color: #e8f5e9; color: #2e7d32; }
        .status-badge.inactive { background-color: #ffebee; color: #c62828; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Employee Database Directory</h1>

    <div class="container">
        <!-- FORM INTERFACE -->
        <div class="card">
            <h2 id="formTitle">Add Employee</h2>
            <form id="empForm">
                <div class="form-group"><label>Emp Code</label><input type="text" id="empcode" required></div>
                <div class="form-group"><label>Name</label><input type="text" id="empname" required></div>
                <div class="form-group"><label>Address</label><input type="text" id="empaddress" required></div>
                <div class="form-group"><label>Zip Code</label><input type="text" id="empzipcode" required></div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="empstatus">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">Save Record</button>
                <button type="button" id="cancelBtn" class="btn-cancel" onclick="resetForm()">Cancel Edit</button>
            </form>
        </div>

        <!-- LIST TABLE VIEW -->
        <div class="card">
            <h2>Employee List</h2>
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="🔍 Type to search employees...">
            </div>
            <div class="employee-list-container">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Zip</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "/employees";
        let allEmployees = []; // Global memory array for offline searching filtering
        let isEditMode = false;

        // --- 1. RUN APP INITTIALIZATION ---
        document.addEventListener("DOMContentLoaded", () => {
            loadEmployees();
            setupSearch();
            setupFormSubmit();
        });

        // --- 2. LOAD ALL EMPLOYEES FROM API ---
        async function loadEmployees() {
            try {
                const response = await fetch(API_URL);
                allEmployees = await response.json();
                renderTable(allEmployees);
            } catch (err) {
                console.error("Error loading employee data profiles:", err);
            }
        }

        // --- 3. RENDER TABLE WITH BINDINGS ---
        function renderTable(employees) {
            const tbody = document.getElementById("employeeTableBody");
            tbody.innerHTML = "";
            
            if (!employees || employees.length === 0) {
                tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px; color: #888;'>No records found.</td></tr>";
                return;
            }
            
            employees.forEach(emp => {
                const tr = document.createElement("tr");
                tr.className = "employee-row";
                tr.title = "Click row to edit details";
                
                tr.innerHTML = `
                    <td>${emp.empcode}</td>
                    <td><b>${emp.empname}</b></td>
                    <td>${emp.empaddress}</td>
                    <td>${emp.empzipcode}</td>
                    <td><span class="status-badge ${emp.empstatus.toLowerCase()}">${emp.empstatus}</span></td>
                    <td>
                        <button class="btn-delete" onclick="event.stopPropagation(); deleteEmployee('${emp.empcode}')">Delete</button>
                    </td>
                `;

                // ACTIVE MOUSE CLICK EVENT FOR QUICK BINDING RETRIEVAL
                tr.addEventListener("click", () => {
                    isEditMode = true;
                    document.getElementById("formTitle").innerText = "Edit Employee";
                    document.getElementById("submitBtn").innerText = "Update Record";
                    document.getElementById("submitBtn").style.backgroundColor = "#3498db";
                    document.getElementById("cancelBtn").style.display = "block";
                    
                    // Match HTML document fields precisely
                    document.getElementById("empcode").value = emp.empcode;
                    document.getElementById("empcode").disabled = true; // Block code mutations during active state changes
                    document.getElementById("empname").value = emp.empname;
                    document.getElementById("empaddress").value = emp.empaddress;
                    document.getElementById("empzipcode").value = emp.empzipcode;
                    document.getElementById("empstatus").value = emp.empstatus;
                });

                tbody.appendChild(tr);
            });
        }

        // --- 4. FORM SUBMISSION WORKFLOW (CREATE / UPDATE) ---
        function setupFormSubmit() {
            document.getElementById("empForm").addEventListener("submit", async (e) => {
                e.preventDefault();
                
                const empCode = document.getElementById("empcode").value;
                const employeePayload = {
                    empcode: empCode,
                    empname: document.getElementById("empname").value,
                    empaddress: document.getElementById("empaddress").value,
                    empzipcode: document.getElementById("empzipcode").value,
                    empstatus: document.getElementById("empstatus").value
                };

                const targetUrl = isEditMode ? `${API_URL}/${empCode}` : API_URL;
                const targetMethod = isEditMode ? "PUT" : "POST";

                try {
                    const response = await fetch(targetUrl, {
                        method: targetMethod,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(employeePayload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || "Transaction failed.");
                    }

                    resetForm();
                    loadEmployees();
                } catch (err) {
                    alert(`⚠️ Operation Error: ${err.message}`);
                }
            });
        }

         // --- 5. PURGE TRANSACTIONS (DELETE) ---
        async function deleteEmployee(empCode) {
            if (!confirm(`Are you sure you want to completely remove employee record: ${empCode}?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/${empCode}`, { 
                    method: "DELETE" 
                });
                
                if (!response.ok) {
                    throw new Error("Could not complete profile purge operation.");
                }
                
                // If we are currently editing the employee that just got deleted, reset the entry panel
                if (document.getElementById("empcode").value === empCode) {
                    resetForm();
                }
                
                // Refresh the table views instantly
                loadEmployees();
            } catch (err) {
                alert(`⚠️ Error: ${err.message}`);
            }
        }

        // --- 6. FORM RESET ROUTINE ---
        function resetForm() {
            isEditMode = false;
            document.getElementById("empForm").reset();
            document.getElementById("formTitle").innerText = "Add Employee";
            document.getElementById("submitBtn").innerText = "Save Record";
            document.getElementById("submitBtn").style.backgroundColor = "#2ecc71";
            document.getElementById("empcode").disabled = false;
            document.getElementById("cancelBtn").style.display = "none";
        }

        // --- 7. REAL-TIME SEARCH BAR ALGORITHM ---
        function setupSearch() {
            document.getElementById("searchBar").addEventListener("input", (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                const filtered = allEmployees.filter(emp => 
                    (emp.empcode && emp.empcode.toLowerCase().includes(query)) || 
                    (emp.empname && emp.empname.toLowerCase().includes(query)) || 
                    (emp.empaddress && emp.empaddress.toLowerCase().includes(query)) || 
                    (emp.empzipcode && emp.empzipcode.toLowerCase().includes(query)) ||
                    (emp.empstatus && emp.empstatus.toLowerCase().includes(query))
                );
                
                renderTable(filtered);
            });
        }
            </script>
</body>
</html>
